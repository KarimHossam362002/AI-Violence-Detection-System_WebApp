services:
  mysql:
    image: mysql:8.4
    container_name: violence-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: violence
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: violence
      MYSQL_PASSWORD: violence
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: violence-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: violence
      DB_USERNAME: violence
      DB_PASSWORD: violence

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: public
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - composer-cache:/tmp/composer-cache
    command: >
      sh -lc " composer install && cp .env.docker.example .env 2>/dev/null || true && php artisan key:generate --force && php artisan storage:link || true && php artisan migrate --seed --force && php artisan serve --host=0.0.0.0 --port=8000 "

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: violence-frontend
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_HOST: 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  mysql-data:
  composer-cache:
  node-modules:
