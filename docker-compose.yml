services:
  mysql:
    image: mysql:8.4
    container_name: violence-mysql
    environment:
      MYSQL_DATABASE: violence
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: violence
      MYSQL_PASSWORD: violence
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: violence-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://127.0.0.1:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: violence
      DB_USERNAME: violence
      DB_PASSWORD: violence
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: public
      INFERENCE_API_TOKEN: ""
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - composer-cache:/tmp/composer-cache
    command: >
      sh -lc "composer install &&
      (test -f .env || cp .env.docker.example .env) &&
      (grep -q '^APP_KEY=base64:' .env || php artisan key:generate --force) &&
      (php artisan storage:link || true) &&
      php artisan migrate --seed --force &&
      php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: violence-frontend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_HOST: 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0"

  weapon-service:
    build:
      context: .
      dockerfile: docker/ai/Dockerfile
    container_name: violence-weapon-service
    environment:
      LARAVEL_INCIDENT_API: http://backend:8000/api/incidents
      CAMERA_SOURCE: "0"
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    command: python ai_service/weapon_detection_service.py
    profiles: ["ai"]
    devices:
      - "/dev/video0:/dev/video0"

  violence-service:
    build:
      context: .
      dockerfile: docker/ai/Dockerfile
    container_name: violence-violence-service
    environment:
      LARAVEL_INCIDENT_API: http://backend:8000/api/incidents
      VIOLENCE_CAMERA_SOURCE: "0"
    ports:
      - "5001:5001"
    volumes:
      - .:/app
    command: python ai_service/violence_detection_service.py
    profiles: ["ai"]
    devices:
      - "/dev/video0:/dev/video0"

  phpmyadmin:
    image: phpmyadmin:5
    container_name: violence-phpmyadmin
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    profiles: ["tools"]

volumes:
  mysql-data:
  composer-cache:
  node-modules:
